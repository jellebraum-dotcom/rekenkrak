<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rekenkrak · voor de leerkracht</title>
<link rel="stylesheet" href="rekenkrak.css">
<meta name="theme-color" content="#FFC233">
</head>
<body>

<!-- ===================== GENERATOR ===================== -->
<main class="gen" id="screenGen">
  <header class="gen__head">
    <div class="logo" aria-hidden="true"><span>+</span><span>−</span><span>×</span><span>÷</span></div>
    <div>
      <h1 class="gen__title">Rekenkrak</h1>
      <p class="gen__sub">Maak een oefening op maat en deel ze met een QR-code of link.</p>
    </div>
  </header>

  <div class="layout">
    <section class="panel" aria-label="Instellingen">
      <div class="block">
        <p class="block__label">Oefenmodus</p>
        <div class="chips" id="session">
          <button class="chip chip--wide" data-k="self" aria-pressed="true" type="button">🧒 Zelf oefenen</button>
          <button class="chip chip--wide" data-k="class" aria-pressed="false" type="button">👩‍🏫 Samen oefenen</button>
        </div>
        <p class="note" id="sessionNote" style="margin-top:10px"></p>
      </div>
      <div id="settingsHost"></div>
    </section>

    <aside class="out">
      <div class="qrcard">
        <div class="qrwrap" id="qr" aria-label="QR-code"></div>
        <p class="qrcard__cap">Scan met een tablet of gsm</p>
        <div class="summary" id="summary"></div>
        <div class="linkrow">
          <input id="link" type="text" readonly aria-label="Link naar de oefening">
          <button class="btn btn--sun" id="copy" type="button">Kopieer</button>
        </div>
        <button class="btn btn--grass btn--block" id="tryit" type="button">▶ Probeer zelf</button>
        <button class="btn btn--ghost btn--block" id="printqr" type="button">🖨️ QR afdrukken</button>
        <p class="note" id="hostnote"></p>
      </div>
    </aside>
  </div>
</main>

<!-- ===================== SPELER ===================== -->
<main class="play hidden" id="screenPlay">
  <div class="play__top">
    <div class="stars"><span class="s" id="starIcon">★</span><span id="starCount">0</span></div>
    <div class="prog"><div class="prog__fill" id="progFill"></div></div>
    <button class="iconbtn" id="soundBtn" type="button" title="Geluid aan/uit" aria-label="Geluid aan of uit">🔊</button>
    <button class="iconbtn" id="quitBtn" type="button" title="Stoppen" aria-label="Stoppen">✕</button>
  </div>
  <div class="stage" id="stage">
    <div class="ring">
      <svg viewBox="0 0 220 142" aria-hidden="true">
        <rect class="ring__track" x="8" y="8" width="204" height="126" rx="26"></rect>
        <rect class="ring__bar" id="ringBar" x="8" y="8" width="204" height="126" rx="26"></rect>
      </svg>
      <div class="eq" id="eq"></div>
    </div>
    <div id="input"></div>
  </div>
</main>
<main class="play hidden" id="screenDone"><div class="results" id="resultsBox"></div></main>

<div class="splash" id="splash" aria-live="polite">
  <div class="splash__card">
    <div class="splash__emo" id="splashEmo">🎉</div>
    <div class="splash__txt" id="splashTxt">Goed zo!</div>
    <div class="splash__hint" id="splashHint"></div>
  </div>
</div>
<div id="glow"></div>
<canvas id="confetti"></canvas>

<script src="qrcode.js"></script>
<script src="engine.js"></script>
<script>
(function(){
"use strict";
var $=function(s){return document.querySelector(s);};
var $$=function(s){return Array.prototype.slice.call(document.querySelectorAll(s));};
var state = MK.defaults();

/* QR + link wijzen naar de leerlingapp (index.html) in dezelfde map */
function fullURL(){
  var dir = location.href.split("#")[0].replace(/[^\/]*$/, "");
  return dir + "index.html" + MK.buildHash(state);
}
function drawQR(url){
  var host=$("#qr"); host.innerHTML="";
  var qr; try{ qr=qrcode(0,"M"); qr.addData(url); qr.make(); }catch(e){ host.textContent="Link te lang"; return; }
  var n=qr.getModuleCount(), cell=4, pad=4, size=n*cell+pad*2;
  var dark=getComputedStyle(document.documentElement).getPropertyValue("--ink").trim()||"#2B2D42";
  var svg='<svg viewBox="0 0 '+size+' '+size+'" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges"><rect width="'+size+'" height="'+size+'" fill="#fff"/><path fill="'+dark+'" d="';
  for(var r=0;r<n;r++)for(var c=0;c<n;c++){ if(qr.isDark(r,c)){ var x=pad+c*cell,y=pad+r*cell; svg+="M"+x+" "+y+"h"+cell+"v"+cell+"h-"+cell+"z"; } }
  host.innerHTML=svg+'"/></svg>';
}
var OPW={add:"+",sub:"−",mul:"×",div:"÷",split:"splitsen"};
function summaryPills(){
  var box=$("#summary"); box.innerHTML="";
  function add(t){var s=document.createElement("span");s.className="pill";s.textContent=t;box.appendChild(s);}
  add("Bewerking: "+state.ops.map(function(o){return OPW[o];}).join(" "));
  var hasMD=state.ops.indexOf("mul")>-1||state.ops.indexOf("div")>-1;
  var hasAS=state.ops.indexOf("add")>-1||state.ops.indexOf("sub")>-1;
  var hasSplit=state.ops.indexOf("split")>-1;
  if(hasMD) add("Tafels: "+state.tables.join(", "));
  if(hasAS) add("tot "+state.range);
  if(hasSplit) add("Splitsen van "+state.splits.join(", "));
  if(!(hasSplit&&state.ops.length===1)) add(state.forms.map(function(f){return MK.FORM_LABEL[f];}).join(" · "));
  if(state.ops.indexOf("div")>-1 && state.rest) add("met rest");
  add(state.seconds? state.seconds+" sec/som":"Geen tijd");
  add(state.count? state.count+" sommen":"Oneindig");
  add(state.session==="class"? "Klassikaal" : (state.mode==="pad"?"Cijfers tikken":"Kiezen uit 4"));
}
function applySessionUI(){
  var cls=state.session==="class";
  $("#sessionNote").innerHTML = cls
    ? "Voor op het digibord: toon de som, laat handen opsteken en tik samen het antwoord in. Op een touchbord kan een kind het zelf aan het bord oplossen — de knoppen zijn er extra groot."
    : "Elk kind oefent op een eigen tablet of gsm.";
  $("#tryit").textContent = cls? "▶ Start klasoefening" : "▶ Probeer zelf";
  $$("#session .chip").forEach(function(x){ x.setAttribute("aria-pressed",(x.dataset.k==="class")===cls); });
}
function sync(){ drawQR(fullURL()); $("#link").value=fullURL(); summaryPills(); applySessionUI(); }

var settings = MK.makeSettings($("#settingsHost"), state, sync);

$$("#session .chip").forEach(function(b){ b.onclick=function(){ state.session=b.dataset.k; sync(); }; });
$("#copy").onclick=function(){
  var inp=$("#link"); inp.select(); inp.setSelectionRange(0,99999);
  var done=function(){ var b=$("#copy"); b.textContent="Gekopieerd ✓"; b.classList.add("copied"); setTimeout(function(){b.textContent="Kopieer";b.classList.remove("copied");},1800); };
  if(navigator.clipboard) navigator.clipboard.writeText(inp.value).then(done,function(){try{document.execCommand("copy");done();}catch(e){}});
  else { try{document.execCommand("copy");done();}catch(e){} }
};
$("#tryit").onclick=function(){ MK.resumeAudio(); MK.startGame(JSON.parse(JSON.stringify(state))); };
$("#printqr").onclick=function(){ window.print(); };
$("#soundBtn").onclick=function(){ MK.toggleSound(); };
function backToGen(){ $("#screenPlay").classList.add("hidden"); $("#screenDone").classList.add("hidden"); $("#screenGen").classList.remove("hidden"); }
$("#quitBtn").onclick=backToGen;
MK.setOnExit(backToGen);

var host = (location.origin && location.origin!=="null");
$("#hostnote").innerHTML = host
  ? '<b>Zo werkt het:</b> de QR-code en link openen de <b>leerlingapp</b> met precies deze oefening erin. Deel ze met je leerlingen — geen login nodig. De instellingen zitten in de link zelf.'
  : '<b>Tip:</b> zet <b>index.html</b> en <b>leerkracht.html</b> samen online (bv. GitHub Pages). De QR-codes wijzen dan automatisch naar de leerlingapp. Met “Probeer zelf” test je de oefening nu al volledig.';

/* eventueel instellingen uit een geopende link overnemen (blijft op generator) */
var fromHash = MK.parseParams(location.hash);
if(fromHash){ for(var k in fromHash) state[k]=fromHash[k]; settings.sync(); }
sync();
})();
</script>
</body>
</html>
